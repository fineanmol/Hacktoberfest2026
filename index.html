<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description"
        content="A beginner-friendly Hacktoberfest project to help developers get started with open source.">

    <title>Hacktoberfest - Contributors</title>
    <link rel="icon" href="https://hacktoberfestswaglist.com/img/hacktoberfest-favicon.ico" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/animate.css@3.5.2/animate.min.css">

    <link rel="stylesheet" href="./css/contributors.css">
    <link rel="stylesheet" href="./css/navbar.css">
    <link rel="stylesheet" href="./css/footer.css">

    <style>
        .hidden {
            display: none;
        }

        .st0 {
            fill: #FF0844;
        }
    </style>
</head>

<body>
    <button type="button" id="back-to-top-btn" aria-label="Back to top">
        <i class="fa fa-angle-double-up" aria-hidden="true"></i>
    </button>

    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm" aria-label="Main navigation">
        <a class="navbar-brand" href="./" id="site-brand">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img"
                aria-labelledby="site-logo-title" class="header__logo" width="50" height="50">
                <title id="site-logo-title">Hacktoberfest</title>
                <path class="st0"
                    d="M0.7,0.7v298.7h298.7V0.7H0.7z M197.8,271.4l-32-32v-95.6l-31.4,31.4v79l-17.3,17.3L99.8,254V70.4L95,65.6  L73,87.7L61.7,76.5l47.8-47.8l0.1,0.1l0,0l1.9,1.8l22.8,22.8V136l31.4-31.4V70.2L150,54.4l25.8-25.8l24.7,24.7v169.1l12.1,12.1  l14.7-14.7l11.1,11.1L197.8,271.4z">
                </path>
            </svg>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarColor01"
            aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarColor01">
            <ul class="navbar-nav ml-lg-auto align-items-lg-center" id="menu"></ul>
        </div>
    </nav>

    <main class="content">
        <div class="container">
            <h1 class="heading"><b>CONTRIBUTORS</b></h1>

            <div class="heart" aria-hidden="true"></div>

            <button type="button" class="tdnn" aria-label="Toggle light mode">
                <span class="moon" aria-hidden="true"></span>
            </button>

            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <p class="rubberBand delay-4s">Add yourself to the list if you contribute.</p>
                <div class="inputs mr-3">
                    <label for="search" class="sr-only">Search contributors</label>
                    <i class="fa fa-search" aria-hidden="true"></i>
                    <input type="search" id="search" class="form-control" placeholder="Search contributors..."
                        autocomplete="off">
                </div>
            </div>

            <p>
                <a class="github-button" data-site-github href="#" data-icon="octicon-star" data-size="large"
                    data-show-count="true" aria-label="Star this repository on GitHub">
                    To get the Hacktoberfest-Accepted label, star this repo
                </a>
            </p>
            <hr style="width:90%">
        </div>

        <div class="container-fluid">
            <div class="box mx-auto my-5 justify-content-center" id="contributors" data-aos="zoom-in-down"></div>
        </div>

        <div class="box mx-auto my-5 justify-content-center text-center" id="box">
            <button type="button" class="btn btn-outline-secondary btn-lg load-more" id="loadMore">
                <u>Load more</u>
            </button>
            <p class="mt-3 mb-0">
                <a href="https://hacktoberfest.com/" target="_blank" rel="noopener noreferrer">Visit hacktoberfest.com</a>
            </p>
        </div>
    </main>

    <footer>
        <div class="footer mt-auto py-3 bg-light text-center">
            <div class="container">
                <div id="stats" class="text-muted"></div>
            </div>
        </div>
        <div class="footer-content">
            <h3 id="site-footer-heading">Hacktoberfest</h3>
            <p id="site-footer-copy">This project takes part in <b>Hacktoberfest</b>.</p>

            <div class="footer-menu">
                <ul class="socials">
                    <li><a href="https://www.facebook.com/fineanmol" target="_blank" rel="noopener noreferrer"
                            aria-label="Facebook"><i class="fa fa-facebook" aria-hidden="true"></i></a></li>
                    <li><a href="https://twitter.com/fineanmol" target="_blank" rel="noopener noreferrer"
                            aria-label="Twitter"><i class="fa fa-twitter" aria-hidden="true"></i></a></li>
                    <li><a href="https://www.instagram.com/fineanmol" target="_blank" rel="noopener noreferrer"
                            aria-label="Instagram"><i class="fa fa-instagram" aria-hidden="true"></i></a></li>
                    <li><a href="https://www.youtube.com/fineanmol" target="_blank" rel="noopener noreferrer"
                            aria-label="YouTube"><i class="fa fa-youtube" aria-hidden="true"></i></a></li>
                    <li><a href="https://www.linkedin.com/in/fineanmol/" target="_blank" rel="noopener noreferrer"
                            aria-label="LinkedIn"><i class="fa fa-linkedin-square" aria-hidden="true"></i></a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script defer src="./contributors/contributorsList.js"></script>
    <script defer src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script defer src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>
    <script defer src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script defer src="./scripts/site-config.js"></script>
    <script defer src="./scripts/menu.js"></script>
    <script defer src="./scripts/contributors-ui.js"></script>
    <script defer src="./scripts/page-ui.js"></script>
    <script async defer src="https://buttons.github.io/buttons.js"></script>
</body>

</html>
