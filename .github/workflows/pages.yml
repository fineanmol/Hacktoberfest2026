name: Deploy · GitHub Pages
on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 1 *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-hf2025
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync docs year and repo links
        run: node scripts/render-docs.js

      - name: Commit synced docs
        run: |
          git config user.name "Anmol Agarwal"
          git config user.email "24794539+fineanmol@users.noreply.github.com"
          git add README.md CONTRIBUTING.md
          if git diff --staged --quiet; then
            echo "Docs already up to date."
          else
            git commit -m "chore: sync docs year and repo links [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
