name: Auto-merge · Bot PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.repository == 'fineanmol/Hacktoberfest2025'
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false

      - name: Merge bot PR (as fineanmol)
        id: merge_fineanmol
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOMERGE_TOKEN }}
          script: |
            const run = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/auto-merge-bot-pr.js`);
            await run({ github, context, core });

      - name: Merge bot PR (fallback)
        if: steps.merge_fineanmol.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/auto-merge-bot-pr.js`);
            await run({ github, context, core });
